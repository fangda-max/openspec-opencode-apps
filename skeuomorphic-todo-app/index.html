<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeuomorphic Todo List</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">My Tasks</h1>
            <div class="task-counter" aria-live="polite">
                <span id="total-tasks">0</span> tasks | 
                <span id="completed-tasks">0</span> completed
            </div>
        </header>

        <main class="app-main">
            <form id="todo-form" class="todo-form" autocomplete="off">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todo-input" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        aria-label="New task description"
                        maxlength="200"
                    >
                    <button 
                        type="submit" 
                        class="btn btn-primary" 
                        id="add-btn"
                        aria-label="Add task"
                    >
                        Add Task
                    </button>
                </div>
            </form>

            <section class="todo-list-section" aria-labelledby="list-heading">
                <h2 id="list-heading" class="section-title">Your Tasks</h2>
                
                <div id="todo-list" class="todo-list" role="list">
                    <!-- Tasks will be added here dynamically -->
                    
                    <div id="empty-state" class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p>No tasks yet. Add one above!</p>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>Built with <span class="heart">❤️</span> using Spec-Kit</p>
        </footer>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/app.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
